version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: rentique_db
    environment:
      MYSQL_DATABASE: rentique
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rentique_backend
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/rentique?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rentique_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data:
